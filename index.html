<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        /* Aapka purana CSS same rahega - Bahut sundar design hai! */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 450px; }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #e0e0e0; z-index: 1; }
        .step { position: relative; z-index: 2; background: white; padding: 0 10px; text-align: center; }
        .step-number { width: 30px; height: 30px; border-radius: 50%; background: #e0e0e0; color: #666; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-weight: bold; transition: all 0.3s ease; }
        .step.active .step-number { background: #667eea; color: white; }
        .step.completed .step-number { background: #48bb78; color: white; }
        .step-label { font-size: 12px; color: #666; }
        .step.active .step-label { color: #667eea; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s ease; }
        input:focus { outline: none; border-color: #667eea; }
        input.error { border-color: #f56565; animation: shake 0.3s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
        .message.show { display: block; }
        .message.success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .message.error { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
        .message.info { background: #bee3f8; color: #2c5282; border: 1px solid #90cdf4; }
        .timer { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .timer span { font-weight: bold; color: #667eea; }
        .resend-link { text-align: center; margin-top: 15px; }
        .resend-link a { color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; }
        .resend-link a.disabled { color: #999; pointer-events: none; }
        .hidden { display: none; }
        .debug-info { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px; font-size: 10px; font-family: monospace; white-space: pre-wrap; display: none; overflow-x: auto; }
        .debug-info.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OTP Verification</h1>
        <p class="subtitle">Verify your mobile number</p>

        <div class="step-indicator">
            <div class="step active" id="step1-indicator">
                <div class="step-number">1</div>
                <div class="step-label">Number</div>
            </div>
            <div class="step" id="step2-indicator">
                <div class="step-number">2</div>
                <div class="step-label">OTP</div>
            </div>
            <div class="step" id="step3-indicator">
                <div class="step-number">3</div>
                <div class="step-label">Verify</div>
            </div>
        </div>

        <div id="step1">
            <div class="form-group">
                <label for="phone">Mobile Number</label>
                <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10">
            </div>
            <button id="sendOtpBtn">Send OTP</button>
        </div>

        <div id="step2" class="hidden">
            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6">
            </div>
            <button id="verifyOtpBtn">Verify OTP</button>
            <div class="timer">OTP expires in <span id="timerDisplay">10:00</span></div>
            <div class="resend-link">
                <a id="resendLink">Resend OTP</a>
            </div>
        </div>

        <div id="step3" class="hidden">
            <div style="text-align: center; padding: 20px;">
                <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
                <h2 style="color: #48bb78; margin-bottom: 10px;">Verified!</h2>
                <button id="resetBtn">Verify Another</button>
            </div>
        </div>

        <div id="message" class="message"></div>
        <div id="debugInfo" class="debug-info"></div>
    </div>

    <script>
        let phoneNumber = '';
        let verificationId = '';
        let timerInterval;
        let timeLeft = 600;

        // Elements
        const elements = {
            step1: document.getElementById('step1'),
            step2: document.getElementById('step2'),
            step3: document.getElementById('step3'),
            msg: document.getElementById('message'),
            debug: document.getElementById('debugInfo'),
            phone: document.getElementById('phone'),
            otp: document.getElementById('otp'),
            sendBtn: document.getElementById('sendOtpBtn'),
            verifyBtn: document.getElementById('verifyOtpBtn')
        };

        function showMessage(text, type) {
            elements.msg.textContent = text;
            elements.msg.className = `message ${type} show`;
        }

        function showDebug(data) {
            elements.debug.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            elements.debug.classList.add('show');
        }

        function updateSteps(step) {
            document.querySelectorAll('.step').forEach((s, idx) => {
                s.classList.remove('active', 'completed');
                if (idx + 1 < step) s.classList.add('completed');
                if (idx + 1 === step) s.classList.add('active');
            });
            elements.step1.classList.toggle('hidden', step !== 1);
            elements.step2.classList.toggle('hidden', step !== 2);
            elements.step3.classList.toggle('hidden', step !== 3);
        }

        function startTimer() {
            timeLeft = 600;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timerDisplay').textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
        }

        // --- MAIN API LOGIC FIX ---
        async function callApi(url) {
            // Using AllOrigins Proxy to fix CORS
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const proxyData = await response.json();
            // Proxy returns actual data inside 'contents' as a string
            return JSON.parse(proxyData.contents);
        }

        elements.sendBtn.onclick = async () => {
            const num = elements.phone.value.trim();
            if (num.length < 10) {
                showMessage('Kripya 10 digit ka number dalein', 'error');
                return;
            }

            elements.sendBtn.disabled = true;
            elements.sendBtn.textContent = 'Bhej rahe hain...';
            
            try {
                const data = await callApi(`https://otp-numberveri-corr.vercel.app/send?number=${num}`);
                showDebug(data);

                if (data.status === 'success') {
                    phoneNumber = num;
                    // Dynamic ID nikaalne ke liye
                    const match = data.verify_at.match(/id=([^&]+)/);
                    verificationId = match ? match[1] : 'pswpch3d';
                    
                    showMessage(data.response, 'success');
                    updateSteps(2);
                    startTimer();
                } else {
                    showMessage('Error: OTP nahi bhej paye', 'error');
                }
            } catch (err) {
                showMessage('Network error: CORS Proxy fail ho gaya', 'error');
                console.error(err);
            } finally {
                elements.sendBtn.disabled = false;
                elements.sendBtn.textContent = 'Send OTP';
            }
        };

        elements.verifyBtn.onclick = async () => {
            const otpVal = elements.otp.value.trim();
            if (otpVal.length < 4) {
                showMessage('Valid OTP dalein', 'error');
                return;
            }

            elements.verifyBtn.disabled = true;
            elements.verifyBtn.textContent = 'Check kar rahe hain...';

            try {
                const data = await callApi(`https://otp-numberveri-corr.vercel.app/verify?id=${verificationId}&otp=${otpVal}`);
                showDebug(data);

                if (data.status === 'success') {
                    showMessage('Verified Successfully!', 'success');
                    updateSteps(3);
                } else {
                    showMessage(data.msg || 'OTP Galat hai!', 'error');
                }
            } catch (err) {
                showMessage('Verification fail ho gayi', 'error');
            } finally {
                elements.verifyBtn.disabled = false;
                elements.verifyBtn.textContent = 'Verify OTP';
            }
        };

        document.getElementById('resetBtn').onclick = () => location.reload();
    </script>
</body>
</html>
