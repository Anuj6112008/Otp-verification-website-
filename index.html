<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass p-8 w-full max-auto max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">✨ OTP Verification ✨</h2>

        <!-- STEP 1: Number Input Section -->
        <div id="step-number">
            <p class="text-gray-600 mb-4 text-center">Apna Mobile Number enter karein</p>
            <div class="mb-4">
                <input type="tel" id="phone" placeholder="9769246185" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400">
            </div>
            <button onclick="sendOTP()" id="btn-send" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition duration-300">
                OTP Bhejein
            </button>
        </div>

        <!-- STEP 2: OTP Input Section (Hidden by default) -->
        <div id="step-otp" class="hidden text-center">
            <p class="text-green-600 font-semibold mb-2">✅ OTP bhej diya gaya hai!</p>
            <p class="text-gray-500 text-sm mb-4" id="target-number"></p>
            
            <input type="text" id="otp-input" placeholder="Enter OTP" maxlength="6"
                class="w-full text-center text-2xl tracking-widest px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400 mb-4">
            
            <button onclick="verifyOTP()" id="btn-verify" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition duration-300">
                Verify Karein
            </button>
            <button onclick="location.reload()" class="mt-4 text-sm text-gray-500 underline">Number Badlein</button>
        </div>

        <!-- Status Messages -->
        <div id="msg" class="mt-4 text-sm text-center font-medium"></div>
    </div>

    <script>
        let verifyUrlTemplate = ""; // Ismein hum API se aayi URL save karenge

        async function sendOTP() {
            const num = document.getElementById('phone').value;
            const msgDiv = document.getElementById('msg');
            const btn = document.getElementById('btn-send');

            if (num.length < 10) {
                msgDiv.innerHTML = "❌ Kripya valid number dalein.";
                msgDiv.className = "mt-4 text-sm text-center font-medium text-red-500";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Processing...";
            msgDiv.innerHTML = "⏳ Sending OTP...";

            try {
                // API Call - Har baar naye number ke liye naya request
                const response = await fetch(`https://otp-numberveri-corr.vercel.app/send?number=${num}`);
                const data = await response.json();

                if (data.status === "success") {
                    // Success! Template save karein verify ke liye
                    verifyUrlTemplate = data.verify_at;
                    
                    // UI Switch karein
                    document.getElementById('step-number').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                    document.getElementById('target-number').innerText = `Number: ${data.number}`;
                    msgDiv.innerHTML = "";
                } else {
                    throw new Error("API Response failed");
                }
            } catch (error) {
                console.error(error);
                msgDiv.innerHTML = "❌ Error: OTP nahi bhej paaye. (CORS issue ho sakta hai)";
                msgDiv.className = "mt-4 text-sm text-center font-medium text-red-500";
                btn.disabled = false;
                btn.innerHTML = "OTP Bhejein";
            }
        }

        async function verifyOTP() {
            const otpValue = document.getElementById('otp-input').value;
            const msgDiv = document.getElementById('msg');
            const btn = document.getElementById('btn-verify');

            if (!otpValue) {
                msgDiv.innerHTML = "❌ OTP enter karein.";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Verifying...";

            // API se jo URL template mila tha, usme <OTP_code> ko replace karein
            const finalVerifyUrl = verifyUrlTemplate.replace("<OTP_code>", otpValue);

            try {
                const response = await fetch(finalVerifyUrl);
                const result = await response.json();

                if (result.status === "success" || result.response.includes("Verified")) {
                    msgDiv.innerHTML = "🎉 Badhaai ho! Verification Safal raha.";
                    msgDiv.className = "mt-4 text-sm text-center font-bold text-green-600";
                    btn.innerHTML = "Verified ✅";
                } else {
                    msgDiv.innerHTML = "❌ Galat OTP. Phir se koshish karein.";
                    msgDiv.className = "mt-4 text-sm text-center font-medium text-red-500";
                    btn.disabled = false;
                    btn.innerHTML = "Verify Karein";
                }
            } catch (error) {
                msgDiv.innerHTML = "❌ Verification Error.";
                btn.disabled = false;
                btn.innerHTML = "Verify Karein";
            }
        }
    </script>
</body>
</html>
