<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #333; margin-bottom: 5px; font-size: 26px; }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; width: 80%; margin-left: 10%; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #e0e0e0; z-index: 1; }
        .step { position: relative; z-index: 2; background: white; padding: 0 5px; }
        .step-number { width: 32px; height: 32px; border-radius: 50%; background: #e0e0e0; color: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; }
        .step.active .step-number { background: #667eea; color: white; transform: scale(1.1); }
        .step.completed .step-number { background: #48bb78; color: white; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.3s; outline: none; text-align: center; }
        input:focus { border-color: #667eea; box-shadow: 0 0 10px rgba(102,126,234,0.2); }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .message { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; line-height: 1.4; }
        .message.show { display: block; }
        .message.success { background: #e6fffa; color: #234e52; border: 1px solid #b2f5ea; }
        .message.error { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; }
        .hidden { display: none; }
        .timer { margin-top: 15px; font-size: 13px; color: #888; }
        #debug { font-size: 10px; color: #aaa; margin-top: 20px; word-break: break-all; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ OTP Verification</h1>
        <p class="subtitle">Enter your details to continue</p>

        <div class="step-indicator">
            <div class="step active" id="s1"><div class="step-number">1</div></div>
            <div class="step" id="s2"><div class="step-number">2</div></div>
            <div class="step" id="s3"><div class="step-number">3</div></div>
        </div>

        <!-- Step 1 -->
        <div id="box1">
            <div class="input-group">
                <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">
            </div>
            <button id="btn1">Send OTP</button>
        </div>

        <!-- Step 2 -->
        <div id="box2" class="hidden">
            <div class="input-group">
                <input type="text" id="otp" placeholder="Enter 6-Digit OTP" maxlength="6">
            </div>
            <button id="btn2">Verify OTP</button>
            <div class="timer">Waiting for SMS... <span id="clock">10:00</span></div>
        </div>

        <!-- Step 3 -->
        <div id="box3" class="hidden">
            <div style="font-size: 60px; margin-bottom: 10px;">✅</div>
            <h2 style="color: #48bb78; margin-bottom: 20px;">Verification Done!</h2>
            <button onclick="location.reload()">Start Again</button>
        </div>

        <div id="msg" class="message"></div>
        <div id="debug"></div>
    </div>

    <script>
        // --- CONFIG ---
        // Hum 'corsproxy.io' use karenge jo bahut reliable hai
        const PROXY = "https://corsproxy.io/?";
        const API_BASE = "https://otp-numberveri-corr.vercel.app";
        
        let verifyId = ""; // Dynamic ID yahan save hoga

        const showMsg = (txt, type) => {
            const m = document.getElementById('msg');
            m.textContent = txt;
            m.className = `message show ${type}`;
        };

        const updateUI = (step) => {
            document.getElementById('box1').classList.toggle('hidden', step !== 1);
            document.getElementById('box2').classList.toggle('hidden', step !== 2);
            document.getElementById('box3').classList.toggle('hidden', step !== 3);
            
            if(step >= 2) document.getElementById('s1').className = "step completed";
            if(step === 2) document.getElementById('s2').className = "step active";
            if(step === 3) {
                document.getElementById('s2').className = "step completed";
                document.getElementById('s3').className = "step active";
            }
        };

        // --- SEND OTP LOGIC ---
        document.getElementById('btn1').onclick = async () => {
            const num = document.getElementById('phone').value;
            if(num.length < 10) return showMsg("Please enter 10 digit number", "error");

            const btn = document.getElementById('btn1');
            btn.disabled = true;
            btn.textContent = "Processing...";
            showMsg("Sending request via proxy...", "success");

            try {
                // API Call via Proxy
                const targetUrl = `${API_BASE}/send?number=${num}`;
                const response = await fetch(PROXY + encodeURIComponent(targetUrl));
                const data = await response.json();
                
                document.getElementById('debug').textContent = "Response: " + JSON.stringify(data);

                if (data.status === "success") {
                    // Extract ID dynamically from 'verify_at' URL
                    const urlObj = new URL(data.verify_at);
                    verifyId = urlObj.searchParams.get("id") || "pswpch3d";
                    
                    showMsg("✅ OTP Sent Successfully!", "success");
                    setTimeout(() => {
                        updateUI(2);
                        startTimer();
                    }, 1000);
                } else {
                    showMsg("Failed: " + (data.response || "Server error"), "error");
                }
            } catch (err) {
                showMsg("Network Error: Proxy server busy. Try again.", "error");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = "Send OTP";
            }
        };

        // --- VERIFY OTP LOGIC ---
        document.getElementById('btn2').onclick = async () => {
            const otpCode = document.getElementById('otp').value;
            if(otpCode.length < 4) return showMsg("Enter valid OTP", "error");

            const btn = document.getElementById('btn2');
            btn.disabled = true;
            btn.textContent = "Verifying...";

            try {
                const targetUrl = `${API_BASE}/verify?id=${verifyId}&otp=${otpCode}`;
                const response = await fetch(PROXY + encodeURIComponent(targetUrl));
                const data = await response.json();

                if (data.status === "success" || (data.response && data.response.includes("Successfully"))) {
                    showMsg("🎉 Verification Success!", "success");
                    setTimeout(() => updateUI(3), 1000);
                } else {
                    showMsg("❌ " + (data.msg || "Invalid OTP"), "error");
                }
            } catch (err) {
                showMsg("Verification Error. Please try again.", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Verify OTP";
            }
        };

        function startTimer() {
            let time = 600;
            const timerObj = setInterval(() => {
                time--;
                let min = Math.floor(time / 60);
                let sec = time % 60;
                document.getElementById('clock').textContent = `${min}:${sec < 10 ? '0'+sec : sec}`;
                if (time <= 0) clearInterval(timerObj);
            }, 1000);
        }
    </script>
</body>
</html>
