<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 450px; }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #e0e0e0; z-index: 1; }
        .step { position: relative; z-index: 2; background: white; padding: 0 10px; text-align: center; }
        .step-number { width: 30px; height: 30px; border-radius: 50%; background: #e0e0e0; color: #666; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-weight: bold; }
        .step.active .step-number { background: #667eea; color: white; }
        .step.completed .step-number { background: #48bb78; color: white; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; text-align: center; }
        .message.show { display: block; }
        .message.success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .message.error { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
        .hidden { display: none; }
        .timer { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ OTP Verification</h1>
        <p class="subtitle">Securely verify your number</p>

        <div class="step-indicator">
            <div class="step active" id="s1-ind"><div class="step-number">1</div></div>
            <div class="step" id="s2-ind"><div class="step-number">2</div></div>
            <div class="step" id="s3-ind"><div class="step-number">3</div></div>
        </div>

        <!-- Step 1: Send OTP -->
        <div id="step1">
            <div class="form-group">
                <input type="tel" id="phone" placeholder="Enter 10-digit number" maxlength="10">
            </div>
            <button id="sendBtn">Send OTP</button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step2" class="hidden">
            <div class="form-group">
                <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
            </div>
            <button id="verifyBtn">Verify OTP</button>
            <div class="timer">Expires in <span id="time">10:00</span></div>
        </div>

        <!-- Step 3: Success -->
        <div id="step3" class="hidden" style="text-align: center;">
            <div style="font-size: 50px;">✅</div>
            <h2 style="color: #48bb78;">Verified Successfully!</h2>
            <button onclick="location.reload()" style="margin-top: 20px;">Try Another</button>
        </div>

        <div id="msg" class="message"></div>
    </div>

    <script>
        let verificationId = '';

        function showMsg(text, type) {
            const m = document.getElementById('msg');
            m.textContent = text;
            m.className = `message ${type} show`;
        }

        // --- STEP 1: SEND OTP ---
        document.getElementById('sendBtn').onclick = async () => {
            const num = document.getElementById('phone').value;
            const btn = document.getElementById('sendBtn');
            
            if(num.length < 10) return showMsg("Valid number dalein", "error");

            btn.disabled = true;
            btn.textContent = "Sending...";

            try {
                // Vercel Rewrite use ho raha hai (/api/send)
                const res = await fetch(`/api/send?number=${num}`);
                const data = await res.json();

                if(data.status === "success") {
                    // Dynamic ID extract karna
                    const match = data.verify_at.match(/id=([^&]+)/);
                    verificationId = match ? match[1] : 'pswpch3d';
                    
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('s1-ind').classList.add('completed');
                    document.getElementById('s2-ind').classList.add('active');
                    showMsg("OTP Sent Successfully!", "success");
                    startTimer();
                } else {
                    showMsg("Failed to send OTP", "error");
                }
            } catch (e) {
                showMsg("CORS Error/Network Error", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Send OTP";
            }
        };

        // --- STEP 2: VERIFY OTP ---
        document.getElementById('verifyBtn').onclick = async () => {
            const otpVal = document.getElementById('otp').value;
            const btn = document.getElementById('verifyBtn');

            if(otpVal.length < 4) return showMsg("OTP dalein", "error");

            btn.disabled = true;
            btn.textContent = "Checking...";

            try {
                // Vercel Rewrite use ho raha hai (/api/verify)
                const res = await fetch(`/api/verify?id=${verificationId}&otp=${otpVal}`);
                const data = await res.json();

                if(data.status === "success" || data.response?.includes("Verified")) {
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                    document.getElementById('s2-ind').classList.add('completed');
                    document.getElementById('s3-ind').classList.add('active');
                    showMsg("Verified!", "success");
                } else {
                    showMsg(data.msg || "Invalid OTP", "error");
                }
            } catch (e) {
                showMsg("Verification Error", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Verify OTP";
            }
        };

        function startTimer() {
            let t = 600;
            setInterval(() => {
                if(t <= 0) return;
                t--;
                document.getElementById('time').textContent = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
